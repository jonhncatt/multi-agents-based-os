name: Regression CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Resolve platform boundary diff base
        id: boundary-base
        run: |
          if [ -n "${{ github.event.pull_request.base.ref }}" ]; then
            echo "base=origin/${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=origin/main" >> "$GITHUB_OUTPUT"
          fi

      - name: Check platform boundaries
        run: python scripts/check_platform_boundaries.py --base "${{ steps.boundary-base.outputs.base }}"

      - name: Collect platform metrics
        run: python scripts/collect_platform_metrics.py

      - name: Compile Python files
        run: python -m compileall app scripts

      - name: Check frontend script syntax
        run: node --check app/static/app.js

      - name: Run pytest suite
        run: pytest -q tests

      - name: Run minimal Agent OS demo smoke
        run: python scripts/demo_minimal_agent_os.py --check

      - name: Run research Swarm demo smoke
        run: python scripts/demo_research_swarm.py --check

      - name: Run regression eval harness
        run: mkdir -p artifacts/evals && python scripts/run_evals.py --cases evals/gate_cases.json --output artifacts/evals/regression-summary.json

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-evals
          path: artifacts/evals

      - name: Upload platform metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-metrics
          path: artifacts/platform_metrics
